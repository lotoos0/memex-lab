name: python-syntax-check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  python-syntax-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile collector package
        run: python -m compileall collector
